<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photo gallery of St. Anne's School, Sira — glimpses of campus life, events and celebrations." />
  <meta name="theme-color" content="#7B1E2B" />
  <title>Gallery | St. Anne's School, Sira</title>

  <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="site-header"></div>

  <!-- ===== Page banner ===== -->
  <section class="page-banner">
    <div class="container">
      <nav class="crumb"><a href="index.html">Home</a><span>›</span>Gallery</nav>
      <span class="eyebrow eyebrow--light">Moments</span>
      <h1>Photo Gallery</h1>
      <p>Glimpses of life, learning and celebration at St. Anne's. Swipe across and tap any photo to view it larger.</p>
    </div>
  </section>

  <!-- ===== Gallery ===== -->
  <section class="section">
    <div class="container">
      <div class="carousel">
        <button class="carousel__btn carousel__btn--prev" id="galPrev" aria-label="Previous photos" hidden>&#8249;</button>
        <div class="carousel__track" id="galleryTrack"><!-- rendered by JS --></div>
        <button class="carousel__btn carousel__btn--next" id="galNext" aria-label="Next photos">&#8250;</button>
      </div>
      <div class="carousel__progress"><span class="carousel__bar" id="galBar"></span></div>
    </div>
  </section>

  <!-- ===== Lightbox ===== -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Photo viewer">
    <button class="lightbox__close" id="lightboxClose" aria-label="Close">&times;</button>
    <button class="lightbox__nav lightbox__prev" id="lightboxPrev" aria-label="Previous photo">&#8249;</button>
    <figure class="lightbox__figure">
      <img class="lightbox__img" id="lightboxImg" src="" alt="" />
      <figcaption class="lightbox__cap" id="lightboxCap"></figcaption>
    </figure>
    <button class="lightbox__nav lightbox__next" id="lightboxNext" aria-label="Next photo">&#8250;</button>
  </div>

  <div id="site-footer"></div>

  <script src="layout.js"></script>
  <script src="script.js"></script>
</body>
</html>
