<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Academic results of St. Anne's School, Sira — SSLC and PU toppers and pass percentages since 1987." />
  <meta name="theme-color" content="#7B1E2B" />
  <title>Results | St. Anne's School, Sira</title>

  <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="site-header"></div>

  <!-- ===== Page banner ===== -->
  <section class="page-banner">
    <div class="container">
      <nav class="crumb"><a href="index.html">Home</a><span>›</span>Results</nav>
      <span class="eyebrow eyebrow--light">Track Record</span>
      <h1>Academic Results &amp; Toppers</h1>
      <p>Consistent cent-percent results and top scorers since our very inception.</p>
    </div>
  </section>

  <!-- ===== Results ===== -->
  <section class="section">
    <div class="container">
      <div class="tabs reveal" role="tablist">
        <button class="tab is-active" data-tab="sslc" role="tab">SSLC</button>
        <button class="tab" data-tab="science" role="tab">PUC — Science</button>
        <button class="tab" data-tab="commerce" role="tab">PUC — Commerce</button>
      </div>

      <div class="table-wrap reveal">
        <table class="rtable">
          <thead>
            <tr>
              <th>Year</th>
              <th>School %</th>
              <th>Topper</th>
              <th class="hide-sm">Total Marks</th>
              <th>Individual %</th>
            </tr>
          </thead>
          <tbody id="resultsBody"><!-- rendered by JS --></tbody>
        </table>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="layout.js"></script>
  <script src="script.js"></script>
</body>
</html>
